<!--
  OBS browser-source overlay for a Prusa CORE One + INDX toolchanger.
  Full-width bottom banner sized for a 1920x150 OBS browser source (it fills the source
  exactly via 100vh/100vw). Two bands: top = thumbnail + job title/bed-message + progress;
  bottom = all print stats in one even row. Transparent page, only the banner shows.
  Enable "Refresh browser when scene becomes active" for a cheap manual recovery.
  Self-contained: no external requests. Polls /api/state on the same origin.
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --accent: #fa6831;
    --card-bg: rgba(12, 14, 18, 0.9);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
  body {
    font-family: system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }
  .tnum { font-variant-numeric: tabular-nums; }

  #card {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    width: 100vw; height: 100vh;          /* fill the OBS source (sized 1920x150) exactly */
    display: flex; flex-direction: column; justify-content: center; gap: 12px;
    background: var(--card-bg);
    border-top: 6px solid var(--accent);
    box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 16px 34px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  #card.ready { opacity: 1; }
  #card.stale { opacity: 0.9; }

  /* Printer disconnected: keep the last-known data visible but grayed + dimmed. */
  #card.offline #thumb-box,
  #card.offline #progress,
  #card.offline #stats,
  #card.offline #name {
    filter: grayscale(1);
    opacity: 0.4;
    transition: opacity 0.3s ease, filter 0.3s ease;
  }
  #card.offline { border-top-color: #e5484d; }
  #offline-tag { display: none; }
  #card.offline #offline-tag {
    display: inline-flex; align-items: center; gap: 5px;
    color: #ff7a7a; font-weight: 600;
  }
  #offline-tag::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: #e5484d; animation: pulse 1.2s ease-in-out infinite;
  }
  #card.offline #stateline-normal { display: none; }

  /* --- "Gone to bed" mode (?bed=true) -------------------------------------- */
  /* Swaps the job name/state for an away message; thumbnail, progress and print
     stats stay visible so the stream still shows the print running overnight. */
  #sleep-msg { display: none; }
  #card.asleep #name, #card.asleep #stateline { display: none; }
  #card.asleep #sleep-msg {
    display: flex; align-items: center; gap: 14px;
    font-size: 25px; font-weight: 600; color: #fff; line-height: 1.2;
  }
  #card.asleep #sleep-msg .zzz {
    font-size: 30px; flex: 0 0 auto;
    animation: pulse 2.2s ease-in-out infinite;
  }
  #card.asleep { border-top-color: #7c86ff; }

  /* Per-state accent colour */
  #card[data-state="PRINTING"] { --accent: #fa6831; }
  #card[data-state="PAUSED"]   { --accent: #f5a623; }
  #card[data-state="FINISHED"] { --accent: #3ddc84; }
  #card[data-state="ERROR"]    { --accent: #e5484d; }
  #card[data-state="IDLE"], #card[data-state="UNKNOWN"] { --accent: rgba(255,255,255,0.28); }

  /* === Top band: thumbnail + title/bed-message + progress ================== */
  .top { display: flex; align-items: center; gap: 28px; min-width: 0; }
  .header { display: flex; gap: 18px; align-items: center; position: relative; flex: 0 1 auto; min-width: 0; }
  #thumb-box {
    width: 92px; height: 92px; flex: 0 0 92px;
    border-radius: 12px; overflow: hidden;
    background: rgba(255, 255, 255, 0.06);
    display: flex; align-items: center; justify-content: center;
  }
  #thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
  #thumb.hidden { display: none; }
  .titles { display: flex; flex-direction: column; min-width: 0; gap: 4px; }
  #name {
    font-size: 25px; font-weight: 600; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 100%;
  }
  #stateline { font-size: 18px; color: rgba(255, 255, 255, 0.62); white-space: nowrap; }
  #stale-dot {
    position: absolute; top: -4px; right: -4px;
    width: 12px; height: 12px; border-radius: 50%;
    background: #f5a623; display: none;
  }
  #card.stale #stale-dot { display: block; animation: pulse 1.4s ease-in-out infinite; }
  #card.dead #stale-dot { background: #e5484d; display: block; }

  #progress { flex: 0 0 600px; margin-left: auto; }
  /* The track's background-image is a canvas render of the job's toolchange positions
     (one faint tick per swap, drawn once per job); the fill covers ticks already passed. */
  .track {
    height: 10px; border-radius: 5px; background-color: rgba(255, 255, 255, 0.12);
    background-size: 100% 100%; overflow: hidden;
  }
  #fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), #ff8a50);
    border-radius: 5px;
    transition: width 0.6s linear;
  }
  #card:not([data-state="PRINTING"]) #fill { background: var(--accent); }
  .pmeta { display: flex; justify-content: space-between; align-items: baseline; margin-top: 8px; font-size: 18px; color: rgba(255,255,255,0.7); white-space: nowrap; }
  #pct { font-weight: 600; color: #fff; }
  #filament { color: rgba(255,255,255,0.55); }
  #eta { white-space: nowrap; }

  /* === Bottom band: every stat in ONE even row (no wrap) =================== */
  /* 12 columns normally; a 13th opens up for the Chamber stat once the printer
     reports a chamber temperature (Connect telemetry only, so it can be absent). */
  #stats {
    display: grid; grid-template-columns: repeat(12, 1fr);
    align-items: end; column-gap: 10px;   /* chips separate the cells, so a slim gap is enough */
    border-top: 1px solid rgba(255, 255, 255, 0.10);
    padding-top: 10px;
  }
  #chamber-stat { display: none; }
  #stats.has-chamber { grid-template-columns: repeat(13, 1fr); }
  #stats.has-chamber #chamber-stat { display: flex; }
  .stat { display: flex; flex-direction: column; gap: 3px; min-width: 0; white-space: nowrap; }
  .stat .label {
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em;
    color: rgba(255, 255, 255, 0.5);
    overflow: hidden; text-overflow: ellipsis;
  }
  /* Each value sits in a Prusa-Connect-style chip. Fixed 25px line + padding keeps every
     chip the same ~33px height regardless of the face size inside, only a few px taller
     than the bare text was (the band has little vertical headroom in the OBS source). */
  .stat .value {
    font-size: 22px; line-height: 25px; font-weight: 600; color: #fff;
    overflow: hidden; text-overflow: ellipsis;
    background: rgba(16, 19, 24, 0.66);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 6px;
    padding: 3px 9px;
  }
  /* 2-track stats: Material holds a long filament name (with a smaller face so it fits one
     line), and Tool needs the width for the 8-slot dock panel below. */
  .stat.wide { grid-column: span 2; }
  .stat.wide .value { font-size: 16px; }
  .sub { color: rgba(255,255,255,0.5); font-weight: 400; }
  /* Stat sub-readouts (units, targets, gram breakdowns) get a smaller face so long values
     like "255° →290°" keep slack inside their chip. line-height 0 keeps the mixed font
     sizes from inflating the line box, which would make those chips taller than the rest. */
  .stat .value .sub { font-size: 17px; line-height: 0; }
  /* Right half of the Tool label: upcoming toolchange ("next 5"), or the swap in
     flight ("2 → 5", accent + pulsing) while the toolchanger is physically swapping. */
  #tool-label { display: flex; justify-content: space-between; gap: 8px; }
  #tool-next { text-transform: none; letter-spacing: 0; color: rgba(255, 255, 255, 0.7); }
  #tool-next.swapping { color: var(--accent); font-weight: 700; animation: pulse 1.2s ease-in-out infinite; }

  /* Tool: a mini front view of the INDX dock plate (8 hanging tools, numbered like the
     printer) instead of a text badge. The chip is the plate; the active dock gets an
     accent ring and its toolhead takes the colour of the filament it is printing (--slot,
     set per dock by the builder; accent fallback for unmapped slots). Pulses mid-swap;
     each tube is tinted with the loaded filament. */
  #tool { padding: 1px 8px; }             /* 29px panel + padding + border = 33px, same as text chips */
  #tool svg { display: block; width: 100%; height: 29px; }
  #tool .glow { opacity: 0; transition: opacity 0.3s ease; }
  #tool .dock.active .glow { opacity: 1; }
  #tool .body { fill: rgba(255, 255, 255, 0.55); }
  #tool .dock.active .body {
    fill: var(--slot, var(--accent));
    /* faint edge so near-black filaments still read as a toolhead on the dark chip */
    stroke: rgba(255, 255, 255, 0.45); stroke-width: 0.75;
  }
  #tool .num {
    fill: rgba(255, 255, 255, 0.65);
    font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums;
  }
  #tool .dock.active .num { fill: #fff; }
  #tool .dock.swapping, #tool svg.swapping { animation: pulse 1.2s ease-in-out infinite; }

  /* === Completion summary: fills the bottom band when a print is FINISHED === */
  #summary { display: none; }
  #card[data-state="FINISHED"] #summary {
    display: flex; align-items: end; gap: 60px;
    border-top: 1px solid rgba(255, 255, 255, 0.10);
    padding-top: 10px;
  }
  .sumtile { display: flex; flex-direction: column; gap: 3px; white-space: nowrap; }
  .sumtile .label {
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em;
    color: rgba(255, 255, 255, 0.5);
  }
  .sumtile .value {
    font-size: 26px; line-height: 26px; font-weight: 600; color: #fff;
    background: rgba(16, 19, 24, 0.66);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 6px;
    padding: 3px 14px;
  }
  .sumtile .value.accent { color: var(--accent); }

  /* Hide print-only sections when not actively printing/paused */
  #card:not([data-state="PRINTING"]):not([data-state="PAUSED"]) .print-only { display: none; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
</style>

<div id="card" data-state="UNKNOWN">
  <div class="top">
    <div class="header">
      <div id="thumb-box"><img id="thumb" class="hidden" alt="" /></div>
      <div class="titles">
        <div id="name">—</div>
        <div id="stateline">
          <span id="stateline-normal">connecting…</span>
          <span id="offline-tag">Printer disconnected</span>
        </div>
        <div id="sleep-msg"><span class="zzz">💤</span><span id="sleep-text"></span></div>
      </div>
      <div id="stale-dot"></div>
    </div>

    <div id="progress" class="print-only">
      <div class="track"><div id="fill"></div></div>
      <div class="pmeta"><span id="pct" class="tnum">0%</span><span id="filament" class="tnum">—</span><span id="eta" class="tnum">—</span></div>
    </div>
  </div>

  <div id="stats" class="print-only">
    <div class="stat">
      <span class="label">Nozzle</span>
      <span class="value tnum" id="temp">—</span>
    </div>
    <div class="stat">
      <span class="label">Bed</span>
      <span class="value tnum" id="bed">—</span>
    </div>
    <div class="stat" id="chamber-stat">
      <span class="label">Chamber</span>
      <span class="value tnum" id="chamber">—</span>
    </div>
    <div class="stat wide">
      <span class="label">Material</span>
      <span class="value" id="material">—</span>
    </div>
    <div class="stat wide">
      <span class="label" id="tool-label"><span>Tool</span><span id="tool-next" class="tnum"></span></span>
      <span class="value" id="tool">—</span>
    </div>
    <div class="stat">
      <span class="label">Speed</span>
      <span class="value tnum" id="speed">—</span>
    </div>
    <div class="stat">
      <span class="label">Flow</span>
      <span class="value tnum" id="flow">—</span>
    </div>
    <div class="stat">
      <span class="label">Layer</span>
      <span class="value tnum" id="layer">—</span>
    </div>
    <div class="stat">
      <span class="label">Fan · Hotend</span>
      <span class="value tnum" id="fanhotend">—</span>
    </div>
    <div class="stat">
      <span class="label">Swaps</span>
      <span class="value tnum" id="swaps">—</span>
    </div>
    <div class="stat">
      <span class="label">Waste of total</span>
      <span class="value tnum" id="waste">—</span>
    </div>
  </div>

  <div id="summary">
    <div class="sumtile">
      <span class="label">Result</span>
      <span class="value accent" id="sum-result">Complete ✔</span>
    </div>
    <div class="sumtile">
      <span class="label">Total time</span>
      <span class="value tnum" id="sum-time">—</span>
    </div>
    <div class="sumtile">
      <span class="label">Filament</span>
      <span class="value tnum" id="sum-filament">—</span>
    </div>
    <div class="sumtile">
      <span class="label">Swaps</span>
      <span class="value tnum" id="sum-swaps">—</span>
    </div>
    <div class="sumtile">
      <span class="label">Waste</span>
      <span class="value tnum" id="sum-waste">—</span>
    </div>
  </div>
</div>

<script>
(function () {
  var POLL_MS = 1000;
  var el = {
    card: document.getElementById('card'),
    thumb: document.getElementById('thumb'),
    name: document.getElementById('name'),
    stateline: document.getElementById('stateline-normal'),
    fill: document.getElementById('fill'),
    pct: document.getElementById('pct'),
    filament: document.getElementById('filament'),
    eta: document.getElementById('eta'),
    temp: document.getElementById('temp'),
    bed: document.getElementById('bed'),
    chamber: document.getElementById('chamber'),
    stats: document.getElementById('stats'),
    track: document.querySelector('.track'),
    material: document.getElementById('material'),
    tool: document.getElementById('tool'),
    toolNext: document.getElementById('tool-next'),
    speed: document.getElementById('speed'),
    flow: document.getElementById('flow'),
    layer: document.getElementById('layer'),
    fanhotend: document.getElementById('fanhotend'),
    swaps: document.getElementById('swaps'),
    waste: document.getElementById('waste'),
    sumTime: document.getElementById('sum-time'),
    sumFilament: document.getElementById('sum-filament'),
    sumSwaps: document.getElementById('sum-swaps'),
    sumWaste: document.getElementById('sum-waste'),
  };
  var S = { data: null, syncedAt: 0, failures: 0, lastThumbKey: null, zHist: [], lastPrint: null,
            curTool: null, prevTool: null, toolChangedAt: null, swapStartedAt: null, prevSwapping: false,
            jobmapKey: null, jobmapBusy: false, jobmapNextTry: 0, hasChamber: false };
  var KNOWN = { PRINTING: 1, PAUSED: 1, FINISHED: 1, ERROR: 1, IDLE: 1 };

  // Brand + colour loaded in each INDX slot, keyed by the printer-UI tool label (1-based,
  // matching d.toolLabel). Used to enrich the generic material readout (e.g. "PETG") with
  // what's actually spooled. Empty slots (T3/T4) fall through to the raw d.material.
  var FILAMENTS = {
    1: 'Prusament Galaxy Black PETG',
    2: 'FlashForge PETG Black',
    5: 'Prusament Pistachio Green PETG',
    6: 'Prusament PETG Chalky Blue',
    7: 'Prusament Urbanite Gray PETG',
    8: 'Prusament Shimmering Violet PETG',
  };
  // On-screen tint for each loaded spool above (approximate; blacks lifted so they
  // stay visible on the dark plate). Colours the tube of every loaded dock and the
  // toolhead of the active one. Slots absent from FILAMENTS render as an empty tube.
  var SLOT_COLORS = {
    1: '#3d3d46',
    2: '#2c2c31',
    5: '#a9bd7f',
    6: '#6d8fb3',
    7: '#8b8e93',
    8: '#8257ad',
  };

  // Build the INDX dock panel once: 8 hanging tools (tube, coupler, heatsink, nozzle)
  // and their slot numbers, mirroring the printer's front. The #tool chip behind the
  // svg acts as the plate. render() only toggles .active/.swapping on these groups.
  var docks = [];
  (function () {
    var s = '<svg viewBox="0 0 320 30" aria-hidden="true">';
    for (var i = 1; i <= 8; i++) {
      var cx = 20 + (i - 1) * 40;
      // --slot carries the filament colour so CSS can paint the active toolhead with it.
      s += '<g class="dock"' + (FILAMENTS[i] ? ' style="--slot: ' + (SLOT_COLORS[i] || '#c8c8c8') + '"' : '') + '>' +
        '<rect class="glow" x="' + (cx - 17.5) + '" y="5.5" width="35" height="22.5" rx="4" fill="var(--accent)" fill-opacity="0.28" stroke="var(--accent)" stroke-opacity="0.9"/>' +
        '<line x1="' + cx + '" y1="2.5" x2="' + cx + '" y2="8.5" stroke="rgba(255,255,255,' + (FILAMENTS[i] ? '0.3' : '0.15') + ')" stroke-width="4.5" stroke-linecap="round"/>' +
        (FILAMENTS[i] ? '<line x1="' + cx + '" y1="2.5" x2="' + cx + '" y2="8.5" stroke="' + (SLOT_COLORS[i] || '#c8c8c8') + '" stroke-width="2.5" stroke-linecap="round"/>' : '') +
        '<rect x="' + (cx - 4.5) + '" y="8" width="9" height="4" rx="1" fill="rgba(255,255,255,0.42)"/>' +
        '<rect class="body" x="' + (cx - 6.5) + '" y="12" width="13" height="10.5" rx="1.5"/>' +
        '<path d="M' + (cx - 6.5) + ' 15.3h13M' + (cx - 6.5) + ' 18.6h13" stroke="rgba(0,0,0,0.4)" stroke-width="1"/>' +
        '<path class="body" d="M' + (cx - 5) + ' 22.5h10l-3.2 4.5h-3.6z"/>' +
        '<text class="num" x="' + (cx - 14) + '" y="21" text-anchor="middle">' + i + '</text>' +
        '</g>';
    }
    el.tool.innerHTML = s + '</svg>';
    el.toolSvg = el.tool.querySelector('svg');
    var gs = el.tool.querySelectorAll('.dock');
    for (var k = 0; k < gs.length; k++) docks[k + 1] = gs[k];
  })();

  function setText(node, v) { if (node.textContent !== v) node.textContent = v; }

  // Debug instrumentation, only active with ?diag=1 so normal use writes nothing.
  var DIAG = location.search.indexOf('diag=1') !== -1;
  function dbg(o) {
    if (!DIAG) return;
    try { o.t = Date.now(); fetch('/api/debug', { method: 'POST', body: JSON.stringify(o), keepalive: true }); } catch (e) {}
  }

  // "Gone to bed" mode: ?bed=true (also ?bed, ?bed=1, ?bed=yes) swaps the job name/state for an
  // away message; the print stats stay visible. Optional ?bedmsg=... overrides the default text.
  (function () {
    var p = new URLSearchParams(location.search);
    var v = p.get('bed');
    var asleep = p.has('bed') && v !== 'false' && v !== '0' && v !== 'no';
    if (!asleep) return;
    el.card.classList.add('asleep');
    document.getElementById('sleep-text').textContent = p.get('bedmsg') ||
      "I've gone to bed. I won't see chat until I wake up, but I'll reply once I'm awake.";
  })();

  function fmtEta(s) {
    if (s == null) return '—';
    s = Math.max(0, Math.round(s));
    var h = (s / 3600) | 0, m = ((s % 3600) / 60) | 0, sec = s % 60;
    if (h) return h + 'h' + String(m).padStart(2, '0') + 'm';
    return String(m).padStart(2, '0') + 'm' + String(sec).padStart(2, '0') + 's';
  }

  function remainingSec() {
    var d = S.data;
    if (!d || d.timeRemainingSec == null) return null;
    // Freeze the countdown when paused or when the printer feed is stale/disconnected.
    if (d.state !== 'PRINTING' || S.disconnected) return d.timeRemainingSec;
    var elapsed = (performance.now() - S.syncedAt) / 1000;
    return Math.max(0, d.timeRemainingSec - elapsed);
  }

  // Wall-clock finish estimate, "~03:12", from the remaining-time countdown. Rounded to
  // whole minutes so a coarse time_remaining feed can't flap the display around :30.
  function doneClock() {
    var rem = remainingSec();
    if (rem == null) return null;
    var end = new Date(Date.now() + Math.round(rem / 60) * 60000);
    return '~' + String(end.getHours()).padStart(2, '0') + ':' + String(end.getMinutes()).padStart(2, '0');
  }

  // Symmetric to remainingSec: climbs between polls while printing, frozen otherwise.
  function elapsedSec() {
    var d = S.data;
    if (!d || d.timeElapsedSec == null) return null;
    if (d.state !== 'PRINTING' || S.disconnected) return d.timeElapsedSec;
    var since = (performance.now() - S.syncedAt) / 1000;
    return d.timeElapsedSec + since;
  }

  function stateLabel(d) {
    switch (d.state) {
      case 'PRINTING': {
        var done = doneClock();
        return 'Printing · ' + fmtEta(remainingSec()) + ' left' + (done ? ' · done ' + done : '');
      }
      case 'PAUSED':   return 'Paused' + (d.progress != null ? ' · ' + Math.floor(d.progress) + '%' : '');
      case 'FINISHED': return 'Print complete ✔';
      case 'IDLE':     return 'Printer idle';
      case 'ERROR':    return 'Printer error';
      default:         return d.state ? String(d.state).toLowerCase() : 'connecting…';
    }
  }

  // Temp readout: show "→target" only when off by more than 3° (avoids PID flicker).
  function tempCell(node, temp, target) {
    if (temp == null) { setText(node, '—'); return; }
    var t = Math.round(temp);
    if (target != null && Math.abs(temp - target) > 3) {
      node.innerHTML = t + '°<span class="sub"> →' + Math.round(target) + '°</span>';
    } else setText(node, t + '°');
  }

  // Percent: whole number at 10%+, one decimal below, so small shares stay readable.
  function fmtPct(n) { return (n >= 10 ? Math.round(n) : n.toFixed(1)) + '%'; }

  // Progress-bar swap ticks: fetch the job's toolchange positions once per job (keyed by
  // thumbnailKey == jobKey) and paint them into the track as a canvas background. The
  // orange fill sits above the background, so passed ticks disappear as the print advances.
  function drawTicks(pcts) {
    if (!pcts.length) { el.track.style.backgroundImage = ''; return; }
    var W = 600, H = 10;
    var c = document.createElement('canvas');
    c.width = W; c.height = H;
    var ctx = c.getContext('2d');
    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    // M73 progress is integer-resolution, so high-swap jobs pile many swaps onto one
    // x column; draw each column once so the alpha doesn't stack to solid white.
    var seen = {};
    for (var i = 0; i < pcts.length; i++) {
      var x = Math.round(pcts[i] / 100 * (W - 1));
      if (seen[x]) continue;
      seen[x] = 1;
      ctx.fillRect(x, 2, 1, H - 4);
    }
    el.track.style.backgroundImage = 'url(' + c.toDataURL() + ')';
  }

  function ensureJobmap(d) {
    // Only worth fetching once the analysis is in (swapsTotal set); re-fetch on job change.
    if (S.jobmapBusy || d.swapsTotal == null || !d.thumbnailKey || S.jobmapKey === d.thumbnailKey) return;
    // Throttle retries: while the server's analysis lags the new job (or the fetch fails),
    // poll the map every few seconds instead of every render.
    if (Date.now() < S.jobmapNextTry) return;
    S.jobmapNextTry = Date.now() + 4000;
    S.jobmapBusy = true;
    fetch('/api/jobmap', { cache: 'no-store' })
      .then(function (r) { if (!r.ok) throw 0; return r.json(); })
      .then(function (jm) {
        // Ignore a map for a different job (analysis mid-switch); next poll retries.
        if (jm.jobKey !== d.thumbnailKey) return;
        S.jobmapKey = jm.jobKey;
        drawTicks(jm.swapPcts || []);
      })
      .catch(function () {})
      .finally(function () { S.jobmapBusy = false; });
  }

  function render() {
    var d = S.data;
    if (!d) return;
    // Disconnected = either we can't reach our local server (actual fetch failures) OR the
    // printer feed is stale (server-reported staleSec). Do NOT use elapsed-time-since-last-
    // fetch: OBS throttles/suspends the browser source's timers when its scene isn't active,
    // which pauses polling and would falsely read as "disconnected", firing the reconnect
    // flash on every scene switch. Real fetch failures (S.failures) still catch a dead server.
    var serverDown = S.failures >= 3;
    var printerStale = d.staleSec != null && d.staleSec > 8;
    var disconnected = serverDown || printerStale;
    if (disconnected !== S.prevDisc) {
      dbg({ ev: 'DISC', disconnected: disconnected, online: d.online, staleSec: d.staleSec, serverDown: serverDown, printerStale: printerStale, failures: S.failures });
      S.prevDisc = disconnected;
    }
    S.disconnected = disconnected;

    var st = KNOWN[d.state] ? d.state : 'UNKNOWN';
    if (el.card.getAttribute('data-state') !== st) el.card.setAttribute('data-state', st);
    el.card.classList.toggle('offline', disconnected);
    el.card.classList.add('ready');

    // Offline tag text: name the actual failure and roughly how long it's been out.
    var tag = document.getElementById('offline-tag');
    if (disconnected) {
      var since = serverDown ? null : d.staleSec;
      tag.textContent = (serverDown ? 'Overlay server offline' : 'Printer disconnected') +
        (since != null && since >= 5 ? ' · ' + fmtEta(since) : '');
    }

    setText(el.name, d.name || (st === 'IDLE' ? 'No active print' : '—'));
    setText(el.stateline, stateLabel(d));

    // Thumbnail: only (re)load when the job changes.
    if (d.thumbnailUrl && d.thumbnailKey && d.thumbnailKey !== S.lastThumbKey) {
      S.lastThumbKey = d.thumbnailKey;
      el.thumb.onerror = function () { el.thumb.classList.add('hidden'); };
      el.thumb.onload = function () { el.thumb.classList.remove('hidden'); };
      el.thumb.src = d.thumbnailUrl + '?j=' + encodeURIComponent(d.thumbnailKey);
    } else if (!d.thumbnailUrl) {
      el.thumb.classList.add('hidden');
    }

    // Progress
    var pct = d.progress != null ? Math.min(100, Math.max(0, d.progress)) : 0;
    el.fill.style.width = pct + '%';
    setText(el.pct, (d.progress != null ? Math.floor(pct) : 0) + '%');
    setText(el.filament, d.filamentG != null ? d.filamentG + ' g' : '');
    // Time readout: elapsed / remaining while printing (climbs / counts down), else just remaining.
    var ela = elapsedSec();
    if (ela != null && d.state === 'PRINTING') {
      // Label elapsed so it doesn't read as ambiguous next to remaining near the halfway point.
      setText(el.eta, 'elapsed ' + fmtEta(ela) + ' / ' + fmtEta(remainingSec()));
    } else setText(el.eta, fmtEta(remainingSec()));

    tempCell(el.temp, d.nozzleTemp, d.nozzleTarget);
    tempCell(el.bed, d.bedTemp, d.bedTarget);

    // Chamber temperature: Connect-only telemetry, so the whole column stays hidden
    // (12-column grid) until the printer reports one. Latched for the session once seen:
    // a dropped frame (server restart, Connect hiccup) must not reflow the band on stream.
    if (d.chamberTemp != null) S.hasChamber = true;
    el.stats.classList.toggle('has-chamber', S.hasChamber);
    if (d.chamberTemp != null) tempCell(el.chamber, d.chamberTemp, d.chamberTarget);
    else if (S.hasChamber) setText(el.chamber, '—');

    // Progress-bar swap ticks: clear leftovers from the previous job, then (re)fetch
    // the map once this job's analysis is available.
    if (S.jobmapKey && S.jobmapKey !== d.thumbnailKey) { S.jobmapKey = null; drawTicks([]); }
    ensureJobmap(d);

    // Current material for the active tool. When we know the loaded material, prefer the
    // specific brand + colour spooled in the active slot (FILAMENTS), falling back to the
    // raw material string for slots we haven't mapped.
    var mat = d.material ? (FILAMENTS[d.toolLabel] || d.material) : (d.analyzing ? '…' : '—');
    setText(el.material, mat);

    // Active tool on the dock panel (toolLabel is 1-based, matching the plate numbers).
    // The dock in use lights up; mid-swap it pulses. A swap with no known target yet
    // (or a swap while the tool is unknown) pulses the whole panel instead.
    for (var ti = 1; ti < docks.length; ti++) {
      docks[ti].classList.toggle('active', ti === d.toolLabel);
      docks[ti].classList.toggle('swapping', ti === d.toolLabel && !!d.swapping);
    }
    el.toolSvg.classList.toggle('swapping', !!d.swapping && d.toolLabel == null);

    // Remember the previous tool so the swap-in-flight readout can show "2 → 5".
    if (d.toolLabel != null && d.toolLabel !== S.curTool) {
      S.prevTool = S.curTool;
      S.curTool = d.toolLabel;
      S.toolChangedAt = performance.now();
    }
    if (d.swapping && !S.prevSwapping) S.swapStartedAt = performance.now();
    S.prevSwapping = !!d.swapping;
    // Right half of the Tool label: swap in flight, else the upcoming toolchange.
    // The crater (swapping) and the label flip come from different feeds on different
    // clocks, so only name the pair when the flip belongs to THIS swap window; before
    // the label catches up the target is simply not known yet.
    var nextTxt = '';
    if (d.swapping) {
      var flipFresh = S.prevTool != null && S.toolChangedAt != null &&
        S.swapStartedAt != null && S.toolChangedAt >= S.swapStartedAt - 5000;
      nextTxt = flipFresh ? S.prevTool + ' → ' + d.toolLabel : '⇄ swapping';
    } else if (d.state === 'PRINTING' && d.nextToolLabel != null) {
      nextTxt = 'next ' + d.nextToolLabel;
    }
    setText(el.toolNext, nextTxt);
    el.toolNext.classList.toggle('swapping', !!d.swapping);

    // Speed / flow overrides, percentages straight off the printer.
    setText(el.speed, d.speed != null ? Math.round(d.speed) + '%' : '—');
    setText(el.flow, d.flow != null ? Math.round(d.flow) + '%' : '—');

    // Layer counter from the gcode layer timeline (progress-based, so z-hops don't wobble
    // it). currentLayer is 0 while heating/homing below layer 1 (falsy on purpose: show
    // the Z fallback then). Until the analysis lands, fall back to the live Z height: the
    // minimum of the last few readings (the true layer Z; hops only spike upward) at 0.1mm.
    if (d.currentLayer && d.totalLayers != null) {
      el.layer.innerHTML = d.currentLayer + '<span class="sub">/' + d.totalLayers + '</span>';
    } else if (d.axisZ != null) {
      var z = S.zHist.length ? Math.min.apply(null, S.zHist) : d.axisZ;
      el.layer.innerHTML = z.toFixed(1) + '<span class="sub"> mm</span>';
    } else setText(el.layer, d.analyzing ? '…' : '—');

    // Hotend fan, RPM.
    if (d.fanHotend != null) el.fanhotend.innerHTML = Math.round(d.fanHotend) + '<span class="sub"> rpm</span>';
    else setText(el.fanhotend, '—');

    // Swaps done / total
    if (d.swapsTotal != null) {
      setText(el.swaps, (d.swapsDone != null ? d.swapsDone : '…') + '/' + d.swapsTotal);
    } else setText(el.swaps, d.analyzing ? '…' : '—');

    // Filament waste (purge) as a share of the total extruded filament: headline % + the
    // purged grams beneath it (the total is already on the progress meta line, and a
    // "x/yyyy g" breakdown overflows the cell on multi-kg jobs).
    if (d.wasteTotal != null && d.filamentG != null && d.filamentG > 0) {
      var wg = d.wasteDone != null ? d.wasteDone : d.wasteTotal;   // live so far, else job total
      el.waste.innerHTML = fmtPct(wg / d.filamentG * 100) +
        '<span class="sub"> ' + Math.round(wg) + 'g</span>';
    } else if (d.wasteTotal != null) {
      var wd = d.wasteDone != null ? String(Math.round(d.wasteDone)) : '…';
      setText(el.waste, wd + '/' + Math.round(d.wasteTotal) + 'g');
    } else setText(el.waste, d.analyzing ? '…' : '—');

    // While printing, keep a snapshot of the final figures. The server clears the bgcode
    // analysis the moment a job ends, so this is the only way the FINISHED summary can show
    // swaps/waste (time + filament also come from here as a fallback).
    if (d.state === 'PRINTING' || d.state === 'PAUSED') {
      S.lastPrint = {
        elapsed: d.timeElapsedSec,
        filamentG: d.filamentG,
        swaps: d.swapsTotal != null ? d.swapsTotal : d.swapsDone,
        waste: d.wasteTotal != null ? d.wasteTotal : d.wasteDone,
      };
    }
    // Completion summary (shown by CSS only when state=FINISHED). Prefer the finished frame's
    // own time/filament, fall back to the last printing snapshot for everything.
    if (d.state === 'FINISHED') {
      var lp = S.lastPrint || {};
      var tt = d.timeElapsedSec != null ? d.timeElapsedSec : lp.elapsed;
      setText(el.sumTime, tt != null ? fmtEta(tt) : '—');
      var fil = d.filamentG != null ? d.filamentG : lp.filamentG;
      setText(el.sumFilament, fil != null ? fil + ' g' : '—');
      var sw = lp.swaps != null ? lp.swaps : d.swapsTotal;
      setText(el.sumSwaps, sw != null ? String(sw) : '—');
      var wst = lp.waste != null ? lp.waste : d.wasteTotal;
      if (wst != null) {
        var sp = (fil != null && fil > 0) ? wst / fil * 100 : null;
        var spStr = sp != null ? ' (' + fmtPct(sp) + ' of total)' : '';
        setText(el.sumWaste, Math.round(wst) + ' g' + spStr);
      } else setText(el.sumWaste, '—');
    }
  }

  function poll() {
    var ctrl = new AbortController();
    var to = setTimeout(function () { ctrl.abort(); }, 900);
    fetch('/api/state', { cache: 'no-store', signal: ctrl.signal })
      .then(function (r) { if (!r.ok) throw 0; return r.json(); })
      .then(function (j) { S.data = j; S.syncedAt = performance.now(); S.failures = 0;
        // Smoothing buffer for Z: keep the last few readings so render can reject z-hop spikes.
        if (j.axisZ != null) { S.zHist.push(j.axisZ); if (S.zHist.length > 4) S.zHist.shift(); }
        dbg({ ev: 'poll', online: j.online, staleSec: j.staleSec }); })
      .catch(function () { S.failures++; dbg({ ev: 'pollERR', failures: S.failures }); })
      .finally(function () { clearTimeout(to); render(); setTimeout(poll, POLL_MS); });
  }

  setInterval(render, 1000);                 // smooth countdown between polls
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden) poll();            // resync instantly on OBS scene activation
  });
  poll();
})();
</script>
